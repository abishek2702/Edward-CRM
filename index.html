<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Edward CRM</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="app">

    <aside class="sidebar">
      <h1>Edward CRM</h1>

      <button>Dashboard</button>
      <button>Pending</button>
      <button>Closing</button>
      <button>Past Clients</button>
      <button>SOI / Vendors</button>
    </aside>

    <main class="main">

      <div class="topbar">
        <input type="text" placeholder="Search contacts..." />
        <button>Add Contact</button>
      </div>

      <div class="cards">

        <div class="card">
          <h3>Active Leads</h3>
          <p>128</p>
        </div>

        <div class="card">
          <h3>Closing</h3>
          <p>12</p>
        </div>

        <div class="card">
          <h3>Birthdays</h3>
          <p>8</p>
        </div>

      </div>

    </main>

  </div>

<script src="script.js"></script>

</body>
</html>
